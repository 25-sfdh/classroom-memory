<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言板 - 高2022级15班回忆馆</title>
  <meta name="description" content="高2022级15班留言板，写下近况、祝福、愿望或聚会建议。">
  <meta name="theme-color" content="#2f6f6a">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
  <link rel="stylesheet" href="../style.css">
</head>
<body class="page-messages">
  <div id="password-gate" class="password-gate">
    <div class="password-card">
      <p class="eyebrow">Private Access</p>
      <h1>高2022级15班回忆馆</h1>
      <p>请输入访问密码后进入网站。</p>
      <form id="password-form" class="stacked-form">
        <label>
          访问密码
          <input id="password-input" type="password" placeholder="请输入密码" autocomplete="current-password" required>
        </label>
        <button class="button primary" type="submit">进入网站</button>
      </form>
      <p id="password-error" class="password-error" aria-live="polite"></p>
    </div>
  </div>

  <a href="#main-content" class="skip-link">跳到主要内容</a>

  <header class="site-header">
    <a class="brand" href="../index.html" aria-label="回到首页">
      <span class="brand-mark">忆</span>
      <span>高2022级15班回忆馆</span>
    </a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav id="site-nav" class="site-nav" aria-label="主导航">
      <a href="../index.html">首页</a>
      <a href="../members/index.html">班级成员</a>
      <a href="../activities/index.html">班级活动</a>
      <a href="../photos/index.html">照片上传</a>
      <a href="../memories/index.html">回忆墙</a>
      <a href="../news/index.html">班级新闻</a>
      <a href="../history/index.html">班级历史</a>
      <a href="../messages/index.html" class="active">留言板</a>
    </nav>
  </header>

  <main id="main-content">
    <section class="page-hero" aria-labelledby="page-hero-title">
      <div class="page-hero-inner">
        <p class="eyebrow">Guestbook</p>
        <h1 id="page-hero-title">留言板</h1>
        <p>近况、祝福、愿望和突然想起的一句话，都可以写在这里。它会像班群之外的一块固定坐标，把大家慢慢连回来。</p>
        <div class="hero-actions">
          <a class="button primary" href="#messages">进入留言板</a>
        </div>
      </div>
    </section>

    <section id="messages" class="section two-column" aria-labelledby="messages-title">
      <div class="section-heading">
        <p class="eyebrow">Guestbook</p>
        <h2 id="messages-title">留言板</h2>
        <p>可以写近况、祝福、愿望或聚会建议。所有留言保存在服务器上，大家都能看到。</p>
      </div>
      <div class="panel">
        <form id="message-form" class="stacked-form">
          <label>
            昵称
            <input id="message-name" type="text" placeholder="你的昵称" required>
          </label>
          <label>
            留言
            <textarea id="message-text" rows="4" placeholder="最近我在..." required></textarea>
          </label>
          <button class="button primary" type="submit">发布留言</button>
        </form>
      </div>
      <div id="message-list" class="post-list" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>版权所有 &copy; 2026 高2022级15班回忆馆<br>管理者邮箱：<a href="mailto:wuqingxu@mail.ustc.edu.cn">wuqingxu@mail.ustc.edu.cn</a></p>
    <a href="../index.html">回到首页</a>
  </footer>

  <script src="../common.js"></script>
  <script src="../messages.js"></script>
</body>
</html>
