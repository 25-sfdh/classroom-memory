      <h1>高2022级15班回忆馆</h1>
      <p>请输入访问密码后进入网站。</p>
      <form id="password-form" class="stacked-form">
        <label>
          访问密码
          <input id="password-input" type="password" placeholder="请输入密码" autocomplete="current-password" required>
        </label>
        <button class="button primary" type="submit">进入网站</button>
      </form>
      <p id="password-error" class="password-error" aria-live="polite"></p>
    </div>
  </div>

  <a href="#main-content" class="skip-link">跳到主要内容</a>

  <header class="site-header">
    <a class="brand" href="../index.html" aria-label="回到首页">

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
      <span></span>

    </nav>

  <main id="main-content">
    <section class="page-hero" aria-labelledby="page-hero-title">
      <div class="page-hero-inner">
        <p class="eyebrow">Notice</p>
        <h1 id="page-hero-title">班级新闻</h1>
        <p>聚会安排、资料整理进度、毕业后的新动态，都可以在这里留下清晰更新，让分散在各地的人还能同步彼此的节奏。</p>
        <div class="hero-actions">
          <a class="button primary" href="#news">查看最新消息</a>
        </div>
      </div>
    </section>

    <section id="news" class="section muted" aria-labelledby="news-title">
      <div class="section-heading">
        <p class="eyebrow">Notice</p>
        <h2 id="news-title">班级新闻 <span class="admin-badge admin-only">管理员</span></h2>
        <p>可以发布班级通知、聚会安排、资料整理进度等内容。</p>
      </div>
      <div class="editor-layout">
        <form id="news-form" class="stacked-form panel admin-only">
          <label>
            日期
            <input id="news-date" type="date" required>
          </label>
          <label>
            新闻标题
            <input id="news-title-input" type="text" placeholder="例如：毕业照电子版整理中" required>
          </label>
          <label>
            新闻内容
            <textarea id="news-text" rows="4" placeholder="写下通知或安排详情" required></textarea>
          </label>
          <button class="button primary" type="submit">发布新闻</button>
        </form>
        <div id="news-list" class="news-list" aria-live="polite"></div>
      </div>
    </section>
  </main>
