<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级活动 - 高2022级15班回忆馆</title>
  <meta name="description" content="高2022级15班班级活动记录，运动会、晚会、旅行和班级合照。">
  <meta name="theme-color" content="#2f6f6a">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div id="password-gate" class="password-gate">
    <div class="password-card">
      <p class="eyebrow">Private Access</p>
      <h1>高2022级15班回忆馆</h1>
      <p>请输入访问密码后进入网站。</p>
      <form id="password-form" class="stacked-form">
        <label>
          访问密码
          <input id="password-input" type="password" placeholder="请输入密码" autocomplete="current-password" required>
        </label>
        <button class="button primary" type="submit">进入网站</button>
      </form>
      <p id="password-error" class="password-error" aria-live="polite"></p>
    </div>
  </div>

  <a href="#main-content" class="skip-link">跳到主要内容</a>

  <header class="site-header">
    <a class="brand" href="../index.html" aria-label="回到首页">
      <span class="brand-mark">忆</span>
      <span>高2022级15班回忆馆</span>
    </a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav id="site-nav" class="site-nav" aria-label="主导航">
      <a href="../index.html">首页</a>
      <a href="../members/index.html">班级成员</a>
      <a href="../activities/index.html" class="active">班级活动</a>
      <a href="../photos/index.html">照片上传</a>
      <a href="../memories/index.html">回忆墙</a>
      <a href="../news/index.html">班级新闻</a>
      <a href="../history/index.html">班级历史</a>
      <a href="../messages/index.html">留言板</a>
    </nav>
  </header>

  <main id="main-content">
    <section id="activities" class="section muted" aria-labelledby="activities-title">
      <div class="section-heading">
        <p class="eyebrow">Moments</p>
        <h2 id="activities-title">班级活动</h2>
        <p>每个活动板块都可以新增和编辑，适合持续补充运动会、晚会、旅行和班级合照。</p>
      </div>
      <div class="editor-layout">
        <form id="activity-form" class="stacked-form panel">
          <input id="activity-edit-index" type="hidden">
          <label>
            活动分类
            <input id="activity-tag" type="text" placeholder="例如：运动会" required>
          </label>
          <label>
            活动标题
            <input id="activity-title-input" type="text" placeholder="例如：接力赛后的拥抱" required>
          </label>
          <label>
            活动说明
            <textarea id="activity-text" rows="4" placeholder="写下这个活动值得记住的细节" required></textarea>
          </label>
          <label>
            上传活动图片
            <input id="activity-file" type="file" accept="image/*">
          </label>
          <button id="activity-submit" class="button primary" type="submit">添加活动</button>
        </form>
        <div class="panel preview-panel">
          <span>活动预览</span>
          <img id="activity-preview" src="../assets/class-photo.jpg" alt="活动图片预览" loading="lazy">
        </div>
      </div>
      <div id="activity-list" class="activity-grid" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>版权所有 &copy; 2026 高2022级15班回忆馆<br>管理者邮箱：<a href="mailto:wuqingxu@mail.ustc.edu.cn">wuqingxu@mail.ustc.edu.cn</a></p>
    <a href="../index.html">回到首页</a>
  </footer>

  <script src="../common.js"></script>
  <script src="../activities.js"></script>
</body>
</html>
